version: '3.8'

networks:
  saas-network:
    driver: bridge

volumes:
  redis_data:
  wppconnect_sessions:
  wppconnect_tokens:
  app_sessions:
  app_logs:

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
      timeout: 600  # 10 minutes build timeout
    container_name: saas-api
    env_file: .env
    ports:
      - "0.0.0.0:4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - WPPCONNECT_URL=http://wppconnect:21465
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      wppconnect:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: saas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # WPPConnect Service
  wppconnect:
    build:
      context: .
      dockerfile: Dockerfile.wppconnect
      timeout: 1200  # 20 minutes build timeout
    container_name: saas-wppconnect
    ports:
      - "0.0.0.0:21465:21465"
    environment:
      - NODE_ENV=production
      - PORT=21465
      - SECRET_KEY=${WPPCONNECT_SECRET}
      - BROWSER_WS_ENDPOINT=
      - LOG_LEVEL=error
      - HEADLESS=true
      - DISPLAY=:99
      - EXEC_MULTI_DEVICE=true
      - ENABLE_CORS=true
      - ALLOWED_ORIGINS=*
    volumes:
      - wppconnect_sessions:/home/supertokens/sessions
      - wppconnect_tokens:/home/supertokens/tokens
    restart: unless-stopped
    networks:
      - saas-network
    cap_add:
      - SYS_ADMIN
    privileged: true
    shm_size: '2gb'