networks:
  saas-network:
    driver: bridge

volumes:
  redis_data:
  wppconnect_sessions:
  wppconnect_tokens:
  app_sessions:
  app_logs:
  certbot_www:
  certbot_conf:

services:
  # Nginx Reverse Proxy with SSL
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: saas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - /etc/ssl:/etc/ssl
    environment:
      - DOMAIN=fees-manager.netlify.app
      - EMAIL=info@sprinthon.com
      - USE_LETSENCRYPT=true  # Set to true in production with a real domain
    depends_on:
      - api
      - wppconnect
    restart: unless-stopped
    networks:
      - saas-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.wppconnect
    container_name: saas-api
    env_file: .env
    ports:
      - "0.0.0.0:4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - WPPCONNECT_URL=http://wppconnect:21465
    volumes:
      - app_sessions:/app/sessions
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      wppconnect:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: saas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # WPPConnect Service
  wppconnect:
    build:
      context: .
      dockerfile: Dockerfile.wppconnect
    container_name: saas-wppconnect
    ports:
      - "0.0.0.0:21465:21465"
    environment:
      - NODE_ENV=production
      - PORT=21465
      - SECRET_KEY=${WPPCONNECT_SECRET}
      - TOKEN=${WPPCONNECT_TOKEN}
      - BROWSER_WS_ENDPOINT=
      - LOG_LEVEL=debug
      - HEADLESS=true
      - DISPLAY=:99
      - EXEC_MULTI_DEVICE=true
      - ENABLE_CORS=true
      - ALLOWED_ORIGINS=*
    volumes:
      - wppconnect_sessions:/home/supertokens/sessions
      - wppconnect_tokens:/home/supertokens/tokens
    restart: unless-stopped
    networks:
      - saas-network
    cap_add:
      - SYS_ADMIN
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "http://127.0.0.1:21465/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s