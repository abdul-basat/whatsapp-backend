version: '3.8'

networks:
  saas-network:
    driver: bridge
    name: saas-network

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: saas-api
    env_file: .env
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - WPPCONNECT_URL=http://wppconnect:21465
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      wppconnect:
        condition: service_started
    restart: unless-stopped
    networks:
      - saas-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: saas-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - saas-network

  # WPPConnect Service
  wppconnect:
    build:
      context: .
      dockerfile: Dockerfile.wppconnect
    container_name: saas-wppconnect
    ports:
      - "21465:21465"
    environment:
      - NODE_ENV=production
      - PORT=21465
      - SECRET_KEY=${WPPCONNECT_SECRET}
      - BROWSER_WS_ENDPOINT=
      - LOG_LEVEL=error
      - HEADLESS=true
      - DISPLAY=:99
      - EXEC_MULTI_DEVICE=true
      - ENABLE_CORS=true
      - ALLOWED_ORIGINS=*
    volumes:
      - ./data/wppconnect/sessions:/home/supertokens/sessions
      - ./data/wppconnect/tokens:/home/supertokens/tokens
    restart: unless-stopped
    networks:
      - saas-network
    cap_add:
      - SYS_ADMIN
    privileged: true
    shm_size: '2gb'

# Volumes
volumes:
  redis_data: